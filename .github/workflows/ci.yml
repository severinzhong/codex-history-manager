name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: python -m py_compile codex_history_manager.py scripts/codex_history.py scripts/codex_history_manager.py setup.py

      - name: Install package
        run: python -m pip install .

      - name: Verify CLI help
        run: codex-history-manager --help
